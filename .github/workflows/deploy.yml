name: Deploy to Lambda

on:
  push:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install test dependencies
        run: pip install boto3 openai ably

      - name: Run handler tests
        run: python test_handler.py

  deploy:
    needs: test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Install dependencies into package directory
        run: |
          pip install ably \
            openai \
            --target ./package \
            --platform manylinux2014_x86_64 \
            --python-version 3.14 \
            --only-binary=:all:

      - name: Build zip
        run: |
          cd package
          zip -r ../lambda.zip .
          cd ..
          zip lambda.zip status_publisher.py lambda_function.py

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Upload to Lambda
        run: |
          aws lambda update-function-code \
            --function-name ${{ secrets.LAMBDA_FUNCTION_NAME }} \
            --zip-file fileb://lambda.zip
